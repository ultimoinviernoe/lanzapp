<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega Lánzate</title>
    <style>
        body { background-color: #FFA64D; font-family: 'Arial', sans-serif; margin: 0; padding: 0; text-align: center; }
        h1 { color: #FFFFFF; font-weight: bold; font-size: 2em; margin-top: 20px; }
        
        .tabs { display: flex; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; margin: 5px; background-color: #D3D3D3; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background-color: #FFFFFF; border: 2px solid #000; }
        
        .content { display: none; margin-top: 20px; text-align: left; width: 90%; max-width: 500px; margin-left: auto; margin-right: auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }
        .content.active { display: block; }
        
        .input-group { margin: 15px 0; }
        label { font-weight: bold; color: white; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: none; background-color: #333; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #555; }
        
        #output { margin-top: 20px; font-weight: bold; width: 90%; max-width: 500px; margin-left: auto; margin-right: auto; text-align: left; }
        .log-entry { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; margin-bottom: 5px; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.3); margin: 20px 0; }
        select { width: 100%; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Bodega Lánzate</h1>

    <div class="tabs">
        <div id="tab-codigo" class="tab active" onclick="showTab('codigo')">Código</div>
        <div id="tab-habitual" class="tab" onclick="showTab('habitual')">Habitual</div>
        <div id="tab-rapel" class="tab" onclick="showTab('rapel')">Rapel</div>
    </div>

    <div id="codigo" class="content active">
        <div class="input-group">
            <label for="codigoInput">Escanear Código:</label>
            <input type="text" id="codigoInput" placeholder="Escribe o escanea..." autofocus>
        </div>
        <button onclick="sendCodigo()">Enviar</button>
    </div>

    <div id="habitual" class="content">
        <div class="input-group">
            <label for="general">General (Escaneo rápido):</label>
            <input type="text" id="general" placeholder="Código individual...">
        </div>
        <button onclick="sendGeneral()">Enviar Individual</button>
        <hr>
        <div class="input-group">
            <label>Kit Básico:</label>
            <input type="text" id="arnes" placeholder="Arnés" style="margin-bottom:5px">
            <input type="text" id="casco" placeholder="Casco" style="margin-bottom:5px">
            <input type="text" id="linea" placeholder="Línea de Vida">
        </div>
        <button onclick="sendMultiple()">Enviar Kit Completo</button>
    </div>

    <div id="rapel" class="content">
        <div class="input-group">
            <label>Kit Rapel:</label>
            <input type="text" id="rapelArnes" placeholder="Arnés" style="margin-bottom:5px">
            <input type="text" id="rapelCasco" placeholder="Casco" style="margin-bottom:5px">
            <input type="text" id="rapelLinea" placeholder="Línea de Vida" style="margin-bottom:5px">
            <input type="text" id="rapelVulkan" placeholder="Vulkan" style="margin-bottom:5px">
            <input type="text" id="rapelMosqueton" placeholder="Mosquetón" style="margin-bottom:5px">
            <input type="text" id="rapelOcho" placeholder="Ocho">
        </div>
        <button onclick="sendRapel()">Enviar Kit Rapel</button>
        <div class="input-group">
            <label for="retos">Otros retos:</label>
            <select id="retos" onchange="showProximamente()">
                <option value="">Selecciona...</option>
                <option value="reto1">Reto 1</option>
                <option value="reto2">Reto 2</option>
            </select>
        </div>
    </div>

    <div id="output"></div>

    <script>
        // URL de tu Web App
        const scriptUrl = "https://script.google.com/macros/s/AKfycby11Nxu7mloDOsQZHqbaxbfYNXQVbS8vZwJuxSO4b23i9zy1SOXrEjaiVu7421IXuqbFg/exec";

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById("tab-" + tabId).classList.add('active');
            document.getElementById(tabId).classList.add('active');
            // Foco automático al input
            const activeInput = document.querySelector(`#${tabId} input`);
            if (activeInput) activeInput.focus();
        }

        async function sendData(id) {
            if (!id) return { status: "error", message: "Campo vacío" };
            const urlFinal = `${scriptUrl}?id=${encodeURIComponent(id)}`;
            
            try {
                // Importante: GitHub Pages necesita mode: 'cors'
                const response = await fetch(urlFinal, { method: "GET" });
                const data = await response.json();
                return data;
            } catch (error) {
                console.error("Error detallado:", error);
                return { status: "error", message: "Error de red/CORS. Verifica la publicación del script." };
            }
        }

        function displayResult(result) {
            const output = document.getElementById("output");
            let color = "#FFFFFF"; 

            if (result.status === "success") {
                color = (result.accion === "salida") ? "#FFF300" : "#00FF87"; 
            } else {
                color = "#FF4B4B"; 
            }

            const div = document.createElement("div");
            div.className = "log-entry";
            div.style.color = color;
            div.innerHTML = `<strong>${result.status.toUpperCase()}:</strong> ${result.message}`;
            output.insertBefore(div, output.firstChild);
        }

        async function sendCodigo() {
            const input = document.getElementById("codigoInput");
            const id = input.value.trim();
            if (!id) return;

            input.disabled = true; // Evitar doble envío
            const result = await sendData(id);
            displayResult(result);
            input.disabled = false;
            input.value = "";
            input.focus();
        }

        async function sendGeneral() {
            const input = document.getElementById("general");
            const id = input.value.trim();
            if (!id) return;
            const result = await sendData(id);
            displayResult(result);
            input.value = "";
        }

        async function processKit(containerId) {
            const container = document.getElementById(containerId);
            const inputs = container.querySelectorAll("input");
            const ids = Array.from(inputs).map(i => i.value.trim()).filter(id => id !== "");

            if (ids.length === 0) return;

            for (const id of ids) {
                const res = await sendData(id);
                displayResult(res);
            }
            inputs.forEach(i => i.value = "");
        }

        function sendMultiple() { processKit('habitual'); }
        function sendRapel() { processKit('rapel'); }

        function showProximamente() {
            const val = document.getElementById("retos").value;
            if(val) alert("Próximamente disponible: " + val);
        }

        // Detectar Enter en cualquier input
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const activeTab = document.querySelector('.content.active').id;
                if (activeTab === 'codigo') sendCodigo();
                if (activeTab === 'habitual' && document.activeElement.id === 'general') sendGeneral();
            }
        });
    </script>
</body>
</html>
