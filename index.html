<script>
    // URL de tu Web App de Google Apps Script
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxpAhG9zorcMjsklvj-jMihukU7x1ccjI-iqPScwY9XQ-oYx5Go9Cs2XaPHwuWmQE01MQ/exec";

    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById("tab-" + tabId).classList.add('active');
        document.getElementById(tabId).classList.add('active');
        document.getElementById("output").innerHTML = "";
    }

    // FUNCIÓN CORE: Ahora maneja JSON y errores de red
    async function sendData(id) {
        if (!id) return { status: "error", message: "Código vacío" };
        
        // El parámetro redirect: "follow" es clave para Apps Script
        const urlFinal = `${scriptUrl}?id=${encodeURIComponent(id)}`;
        
        try {
            const response = await fetch(urlFinal, {
                method: "GET",
                mode: "cors" // Crucial para GitHub Pages
            });

            if (!response.ok) throw new Error("Error en servidor");

            const data = await response.json();
            return data;
        } catch (error) {
            console.error(error);
            return { status: "error", message: "Error de conexión. Revisa el internet." };
        }
    }

    // Helper para mostrar mensajes con color
    function displayResult(result) {
        const output = document.getElementById("output");
        let color = "#FFFFFF"; // Blanco por defecto

        if (result.status === "success") {
            color = result.accion === "salida" ? "#FFD700" : "#90EE90"; // Amarillo salida, Verde regreso
        } else if (result.status === "not_found") {
            color = "#FF6347"; // Tomate/Rojo
        }

        const nuevoMensaje = `<div style="color: ${color}; margin-bottom: 5px;">• ${result.message}</div>`;
        output.innerHTML = nuevoMensaje + output.innerHTML; // Los nuevos arriba
    }

    // ENVIAR UN SOLO CÓDIGO
    async function sendCodigo() {
        const input = document.getElementById("codigoInput");
        const id = input.value.trim();
        if (!id) return;

        document.getElementById("output").innerHTML = "⌛ Procesando...";
        const result = await sendData(id);
        
        document.getElementById("output").innerHTML = ""; // Limpiar el "Procesando"
        displayResult(result);
        input.value = ""; // Limpiar campo para el siguiente escaneo
        input.focus();
    }

    // ENVIAR GENERAL
    async function sendGeneral() {
        const input = document.getElementById("general");
        const id = input.value.trim();
        if (!id) return;

        document.getElementById("output").innerHTML = "⌛ Procesando...";
        const result = await sendData(id);
        
        document.getElementById("output").innerHTML = "";
        displayResult(result);
        input.value = "";
    }

    // ENVIAR KITS (Lógica secuencial para evitar colisiones)
    async function processKit(containerId) {
        const inputs = document.querySelectorAll(`#${containerId} input`);
        const ids = Array.from(inputs).map(i => i.value.trim()).filter(id => id !== "");

        if (ids.length === 0) return;

        document.getElementById("output").innerHTML = "⌛ Procesando Kit...";
        let resultsFound = [];

        // Los procesamos uno por uno para que el LockService de Apps Script trabaje bien
        for (const id of ids) {
            const res = await sendData(id);
            displayResult(res);
        }

        // Limpiar todos los inputs del contenedor tras terminar
        inputs.forEach(i => i.value = "");
        // Quitar el mensaje de "Procesando" si quedó ahí
        if(document.getElementById("output").innerHTML.includes("⌛")) {
            document.getElementById("output").innerHTML = "✅ Kit procesado.";
        }
    }

    function sendMultiple() { processKit('habitual'); }
    function sendRapel() { processKit('rapel'); }

    function showProximamente() {
        const select = document.getElementById("retos");
        if (select.value) {
            document.getElementById("output").innerHTML = `<span style="color: #eee">Próximamente: ${select.value} 🚀</span>`;
            select.value = "";
        }
    }

    // Permitir enviar con la tecla "Enter"
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const activeTab = document.querySelector('.content.active').id;
            if (activeTab === 'codigo') sendCodigo();
            if (activeTab === 'habitual' && document.activeElement.id === 'general') sendGeneral();
        }
    });
</script>
